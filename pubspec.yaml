name: qazan
description: "Qazan — sadiqlik və müştəri izləmə platforması. Loyalty & customer tracking platform."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # QR codes
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.18.0

  # Networking
  dio: ^5.7.0
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
